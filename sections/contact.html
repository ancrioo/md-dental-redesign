<!-- contact.html -->
<section id="contact" class="contact section container">
  <div class="contact-shell">
    <div class="contact-copy animate">
      <div class="eyebrow">Appointment request</div>
      <h2>A polished first visit starts here.</h2>
      <p class="lead">Tell us what you are considering and the care team will shape the right consultation path.</p>

      <div class="visit-card">
        <h3>MD Dental Smile Atelier</h3>
        <p>123 Luxury Ave, Suite 10<br>City, State 400001</p>
        <a href="tel:+911234567890">+91 12345 67890</a>
        <div class="hours">
          <span>Mon - Sat</span>
          <strong>9:00 AM - 7:00 PM</strong>
        </div>
      </div>
    </div>

    <form class="contact-form animate" action="#" onsubmit="alert('This is a demo. Integrate backend for real submissions.');return false;">
      <label>
        <span>Full name</span>
        <input class="input" type="text" name="name" placeholder="Your name" required>
      </label>
      <div class="form-row">
        <label>
          <span>Email</span>
          <input class="input" type="email" name="email" placeholder="you@email.com" required>
        </label>
        <label>
          <span>Phone</span>
          <input class="input" type="tel" name="phone" placeholder="Phone number" required>
        </label>
      </div>
      <label>
        <span>How can we help?</span>
        <textarea class="input" rows="4" name="message" placeholder="Consultation goal or treatment question" required></textarea>
      </label>
      <button class="btn" type="submit">Request Appointment</button>
    </form>
  </div>
</section>
